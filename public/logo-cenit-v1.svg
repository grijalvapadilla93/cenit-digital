<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="500" height="160">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6d43c6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Isotipo: triangle/zenith mark -->
  <g transform="translate(30, 20)">
    <!-- Outer triangle -->
    <polygon points="60,0 120,100 0,100" fill="none" stroke="url(#grad)" stroke-width="3"/>
    <!-- Inner triangle (cut out effect) -->
    <polygon points="60,30 95,85 25,85" fill="url(#grad)" opacity="0.15"/>
    <!-- Center dot (peak/focal point) -->
    <circle cx="60" cy="55" r="8" fill="url(#grad)"/>
    <!-- Ascending line -->
    <line x1="60" y1="55" x2="60" y2="100" stroke="url(#grad)" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Text: CENIT -->
  <text x="175" y="85" font-family="Space Grotesk, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">
    CENIT
  </text>
  
  <!-- Text: DIGITAL -->
  <text x="175" y="115" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="400" fill="#a78bfa" letter-spacing="8">
    DIGITAL
  </text>
  
  <!-- Accent line -->
  <line x1="175" y1="125" x2="340" y2="125" stroke="url(#grad)" stroke-width="1" opacity="0.5"/>
</svg>
